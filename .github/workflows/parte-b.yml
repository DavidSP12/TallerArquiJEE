name: CI Parte B

on:
  push:
    branches: ["main"]
    paths:
      - "ParteB/**"
      - ".github/workflows/parte-b.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "ParteB/**"
      - ".github/workflows/parte-b.yml"
  workflow_dispatch:

jobs:
  build-parte-b:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: ParteB

    steps:
      - name: Obtener el repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Dar permisos al wrapper de Maven
        run: chmod +x mvnw

      - name: Compilar la Parte B
        run: ./mvnw -B -ntp clean package

      - name: Guardar WAR generado
        uses: actions/upload-artifact@v4
        with:
          name: parte-b-war
          path: ParteB/demo/target/demo.war
          if-no-files-found: error
