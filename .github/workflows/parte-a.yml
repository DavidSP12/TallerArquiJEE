name: CI Parte A

on:
  push:
    branches: ["main"]
    paths:
      - "ParteA/**"
      - ".github/workflows/parte-a.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "ParteA/**"
      - ".github/workflows/parte-a.yml"
  workflow_dispatch:

jobs:
  run-parte-a:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: ParteA

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mostrar versiones de Docker
        run: |
          docker --version
          docker compose version

      - name: Construir y arrancar el servidor gRPC
        run: docker compose up -d --build server

      - name: Ejecutar sincronización del cliente gRPC
        run: docker compose run --rm client

      - name: Ejecutar prueba de carga
        run: |
          docker compose --profile load run --rm \
            -e LOAD_USERS=80 \
            -e LOAD_REQUESTS_PER_USER=150 \
            load-tester

      - name: Mostrar logs del servidor
        if: always()
        run: docker compose logs --no-color --tail=200 server

      - name: Detener contenedores y volúmenes
        if: always()
        run: docker compose down -v
