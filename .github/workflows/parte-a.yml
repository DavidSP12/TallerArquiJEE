name: Parte A CI

on:
  push:
    branches: ["main"]
    paths:
      - "ParteA/**"
      - ".github/workflows/parte-a.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "ParteA/**"
      - ".github/workflows/parte-a.yml"
  workflow_dispatch:

jobs:
  run-parte-a:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: ParteA

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build and start gRPC server
        run: docker compose up -d --build server

      - name: Run gRPC client sync
        run: docker compose run --rm client

      - name: Run load test
        run: |
          docker compose --profile load run --rm \
            -e LOAD_USERS=50 \
            -e LOAD_REQUESTS_PER_USER=100 \
            load-tester

      - name: Print server logs
        if: always()
        run: docker compose logs --no-color --tail=200 server

      - name: Tear down containers and volumes
        if: always()
        run: docker compose down -v
